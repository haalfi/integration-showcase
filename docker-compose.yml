services:
  temporal:
    image: temporalio/auto-setup:1.25
    environment:
      DB: memory
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "tctl --address localhost:7233 cluster health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  temporal-ui:
    image: temporalio/ui:2.31
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.32.0
    command: azurite-blob --blobHost 0.0.0.0
    ports:
      - "10000:10000"

  jaeger:
    image: jaegertracing/all-in-one:1.62
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC -- services send traces here
      - "4318:4318"    # OTLP HTTP
