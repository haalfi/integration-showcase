services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    # Pinned to 'latest' -- tctl (the old CLI) was removed from recent images;
    # pin to a specific digest once the stack is confirmed stable.
    image: temporalio/auto-setup:latest
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      # tctl reached End of Support 2025-09-30; use the current Temporal CLI.
      # auto-setup binds to the container's NIC IP (not localhost), so we
      # resolve it at runtime via $(hostname -i).
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-ui:
    # Pinned to 'latest' -- 2.31 tag not available on Docker Hub.
    image: temporalio/ui:latest
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    # --skipApiVersionCheck: azure-storage-blob SDK sends API version 2026-02-06;
    # azurite 3.35.0 does not list it as supported but handles it correctly.
    # Remove once azurite releases with explicit 2026-02-06 support.
    command: azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - "10000:10000"

  jaeger:
    # Pinned to 'latest' -- 1.62 tag not available on Docker Hub.
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC -- services send traces here
      - "4318:4318"    # OTLP HTTP
